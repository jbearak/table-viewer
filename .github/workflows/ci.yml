name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          # No step pushes/fetches after checkout, so don't persist GITHUB_TOKEN
          # in .git/config (least privilege).
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: '24'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Unit tests (vitest)
        run: npm test

      # The VS Code Extension Host is a GUI app; Linux runners are headless,
      # so launch it under a virtual framebuffer.
      - name: Integration tests (VS Code Extension Host)
        run: xvfb-run -a npm run test:integration
