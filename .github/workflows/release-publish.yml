name: Release Publish

on:
  workflow_run:
    workflows: [Release Build]
    types: [completed]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g., v0.1.1)'
        required: true
        type: string

concurrency:
  group: release-publish-${{ inputs.tag || github.event.workflow_run.head_branch }}
  cancel-in-progress: false

permissions:
  actions: read
  contents: write

env:
  RELEASE_TAG: ${{ inputs.tag || github.event.workflow_run.head_branch }}

jobs:
  publish:
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.conclusion == 'success' &&
       startsWith(github.event.workflow_run.head_branch, 'v'))
    environment: release

    steps:
      - name: Checkout tag
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ env.RELEASE_TAG }}
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: '22'

      - name: Validate tag + version
        shell: bash
        env:
          THE_TAG: ${{ env.RELEASE_TAG }}
        run: |
          set -euo pipefail

          if [[ ! "$THE_TAG" =~ ^v[0-9] ]]; then
            echo "ERROR: tag must start with 'v' and a digit (e.g., v0.1.1). Got: $THE_TAG" >&2
            exit 1
          fi

          if [[ "$THE_TAG" =~ [[:space:]] ]]; then
            echo "ERROR: tag must not contain whitespace. Got: $THE_TAG" >&2
            exit 1
          fi

          if ! git rev-parse -q --verify "refs/tags/$THE_TAG" >/dev/null; then
            echo "ERROR: tag does not exist in this repository: $THE_TAG" >&2
            exit 1
          fi

          PKG_VERSION=$(node -p "require('./package.json').version")
          EXPECTED_TAG="v${PKG_VERSION}"
          if [[ "$THE_TAG" != "$EXPECTED_TAG" ]]; then
            echo "ERROR: tag/version mismatch. tag=$THE_TAG package.json=$PKG_VERSION (expected tag $EXPECTED_TAG)" >&2
            exit 1
          fi

      - name: Download build artifacts
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          THE_TAG: ${{ env.RELEASE_TAG }}
          WORKFLOW_RUN_ID: ${{ github.event.workflow_run.id }}
        run: |
          set -euo pipefail

          ARTIFACT_NAME="release-${THE_TAG}"

          if [[ "${{ github.event_name }}" == "workflow_run" ]]; then
            BUILD_RUN_ID="$WORKFLOW_RUN_ID"
          else
            BUILD_RUN_ID=$(gh api --paginate "repos/${{ github.repository }}/actions/artifacts" \
              --jq ".artifacts[] | select(.name == \"$ARTIFACT_NAME\" and .expired == false) | .workflow_run.id" \
              | head -1)
          fi

          if [[ -z "${BUILD_RUN_ID:-}" ]]; then
            echo "ERROR: No artifact found named '$ARTIFACT_NAME'" >&2
            echo "Make sure Release Build completed successfully for $THE_TAG" >&2
            exit 1
          fi

          gh run download "$BUILD_RUN_ID" --name "$ARTIFACT_NAME"

      - name: Verify checksums
        shell: bash
        run: |
          set -euo pipefail
          sha256sum -c table-viewer-*.vsix.sha256

      - name: Install publish tools
        run: npm install --global @vscode/vsce@3.7.1 ovsx@0.10.9

      - name: Publish to VS Code Marketplace
        run: vsce publish --packagePath table-viewer-*.vsix --pat "$VSCE_PAT"
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}

      - name: Publish to Open VSX
        run: ovsx publish table-viewer-*.vsix --pat "$OVSX_PAT"
        env:
          OVSX_PAT: ${{ secrets.OVSX_PAT }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@a06a81a03ee405af7f2048a818ed3f03bbf83c7b # v2.5.0
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: Release ${{ env.RELEASE_TAG }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            table-viewer-*.vsix
            table-viewer-*.vsix.sha256
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
